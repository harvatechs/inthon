<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- SEO tags via standard layouts or manual for Jekyll compatibility -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Relative pathing for GitHub Pages subdirectories -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v=1.1">
  <link rel="icon" type="image/png" href="{{ '/assets/images/icon.png' | relative_url }}">
  
  <!-- MathJax configuration for LaTeX math rendering -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>
  <header class="navbar">
    <div class="container navbar-container">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-symbol">∫</span>
        <span class="logo-text">INTHON</span>
      </a>
      <nav class="nav-links">
        <a href="{{ '/' | relative_url }}">Research Overview</a>
        <a href="{{ '/guide.html' | relative_url }}">Guide & Tutorials</a>
        <a href="{{ '/spec.html' | relative_url }}">Technical Spec & Benchmarks</a>
        <a href="{{ '/blog.html' | relative_url }}">Blogs</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle dark/light mode" title="Toggle theme">
          <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <a href="https://github.com/{{ site.github_username }}/inthon" class="btn btn-secondary btn-sm" id="nav-github-btn" target="_blank" rel="noopener">
          <span>GitHub</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
      </div>
    </div>
  </header>

  {{ content }}

  <footer class="footer">
    <div class="container footer-container">
      <div class="footer-left">
        &copy; 2026 INTHON Research Group.
      </div>
      <div class="footer-right">
        Department of Advanced Computing & Research &bull; HarVa DeepLabs
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/app.js' | relative_url }}"></script>
</body>
</html>
