project: INTHON
version_target: 0.1.0-alpha
mission: Build a Python-hosted agent-level programming language for safe, compact, auditable AI workflows.

source_documents:
  - INTHON_PRD.pdf
  - INTHON_ENGINE.pdf
  - INTHON_PAPER.pdf
  - INTHON_KIMI_REF.pdf

non_negotiable_invariants:
  - Every tool call is schema-validated before execution.
  - Every side effect is declared, logged, and policy-checked.
  - Every execution emits a complete, replayable trace.
  - Dangerous Python operations are blocked before import resolution.
  - Human approval gates halt synchronously.

v0_1_must_have:
  - .inth files
  - CLI runner
  - variables
  - functions
  - expressions
  - agent blocks
  - policy blocks
  - tool imports
  - tool registry
  - mock tools
  - Python bridge
  - Pandas basic support
  - runtime trace
  - tests
  - documentation

v0_1_must_not_have:
  - custom bytecode VM
  - full optimizer
  - native tensor compiler
  - distributed runtime
  - self-hosting compiler
  - arbitrary API calls without validation
  - arbitrary shell execution

phases:
  - id: 0
    name: repository_setup
    deliverables: [pyproject, package_skeleton, docs_skeleton, tests_skeleton]
  - id: 1
    name: lexer_parser
    deliverables: [tokens, tokenizer, grammar, parser, transformer, parser_tests]
  - id: 2
    name: ast_semantic
    deliverables: [ast_nodes, visitor, scope, analyzer, type_checker, semantic_tests]
  - id: 3
    name: ir
    deliverables: [ir_nodes, builder, serializer, static_tool_graph]
  - id: 4
    name: runtime
    deliverables: [context, values, evaluator, executor, interpreter, trace]
  - id: 5
    name: tools
    deliverables: [tool_spec, registry, validator, mock_tools, cost_model]
  - id: 6
    name: policy_security
    deliverables: [policy_model, engine, approval_gate, audit_log, sandbox]
  - id: 7
    name: pybridge
    deliverables: [safe_importer, allowlist, denylist, converters, adapters]
  - id: 8
    name: cli_docs_examples
    deliverables: [cli, quickstart, guides, examples]
  - id: 9
    name: benchmarks_release
    deliverables: [benchmarks, changelog, release_notes]

acceptance_commands:
  - python -m pytest --cov=inthon
  - ruff check .
  - mypy inthon
  - inthon run examples/hello.inth
  - inthon check examples/agent_research.inth
