    <style>
      [data-composition-id="benchmark-chart"] {

      }

      .cards-container {
        display: flex;

        max-width: 1760px;
        justify-content: space-between;
      }

      /* Stat Card Styles */
      .stat-card {
        flex: 1;
        height: 600px;
        background-color: #111827;
        border: 1px solid #1F2937;
        border-radius: 16px;
        padding: 40px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
        opacity: 0;
        transform: translateY(40px);
      }

      .card-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card-title {
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: #F9FAFB;
      }

      .card-subtitle {
        font-size: 15px;
        color: #6B7280;
      }

      .card-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        margin: 30px 0;
      }

      .card-footer {
        height: 60px;
        display: flex;
        align-items: center;
      }

      /* Card 1: Token Efficiency (Bar Chart) */
      .chart-wrapper {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
      }

      .chart-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .row-info {
        display: flex;
        justify-content: space-between;
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        color: #F9FAFB;
      }

      .bar-outer {
        height: 36px;
        background-color: #1F2937;
        border-radius: 18px;
        width: 100%;
        overflow: hidden;
        position: relative;
      }

      .bar-inner {
        height: 100%;
        width: 0%;
        border-radius: 18px;
        transition: box-shadow 0.5s ease;
      }

      .bar-natural {
        background-color: #4B5563; /* Dark Gray */
      }

      .bar-json {
        background-color: #8B5CF6; /* Purple */
      }

      .bar-inthon {
        background-color: #10B981; /* Green */
        box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      }

      .check-badge {
        color: #10B981;
        margin-left: 8px;
        opacity: 0;
        font-weight: bold;
      }

      .badge-efficiency {
        background-color: rgba(16, 185, 129, 0.1);
        border: 1px solid #10B981;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        color: #10B981;
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        opacity: 0;
        transform: scale(0.9);
      }

      /* Card 2: Sandbox Safety (Progress Ring) */
      .safety-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .progress-ring-container {
        position: relative;
        width: 180px;
        height: 180px;
      }

      .progress-ring {
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      .progress-ring-bg {
        stroke: #1F2937;
      }

      .progress-ring-circle {
        stroke: #10B981;
        stroke-dasharray: 439.82; /* 2 * PI * 70 */
        stroke-dashoffset: 439.82;
        transition: stroke-dashoffset 0.1s;
      }

      .ring-center-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-family: 'JetBrains Mono', monospace;
        width: 120px;
      }

      .ring-number {
        font-size: 26px;
        font-weight: bold;
        color: #F9FAFB;
      }

      .ring-label {
        font-size: 12px;
        color: #6B7280;
        margin-top: 4px;
        text-transform: uppercase;
      }

      .exploit-icons-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        width: 100%;
      }

      .exploit-pill {
        background-color: rgba(239, 68, 68, 0.05);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 6px;
        padding: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #EF4444;
        font-family: 'JetBrains Mono', monospace;
        justify-content: center;
        opacity: 0;
        transform: scale(0.9);
      }

      .exploit-pill.blocked {
        border-color: rgba(16, 185, 129, 0.3);
        background-color: rgba(16, 185, 129, 0.05);
        color: #10B981;
      }

      .badge-safety {
        font-size: 15px;
        color: #10B981;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
      }

      /* Card 3: VM Latency (Counters) */
      .latency-wrapper {
        display: flex;
        flex-direction: column;
        gap: 40px;
        width: 100%;
        padding-left: 20px;
      }

      .latency-stat {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .latency-num-container {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .latency-val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 68px;
        font-weight: bold;
        color: #00D4FF;
        text-shadow: 0 0 15px rgba(0, 212, 255, 0.25);
        line-height: 1;
      }

      .latency-unit {
        font-family: 'JetBrains Mono', monospace;
        font-size: 24px;
        color: #6B7280;
      }

      .latency-desc {
        font-size: 16px;
        color: #F9FAFB;
      }

      .badge-latency {
        font-size: 16px;
        color: #00D4FF;
        font-weight: bold;
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // --- SCENE 5 SCHEDULE (Timeline relative: total 16s: 0s to 16s) ---
        
        // 1. Entrance of the Cards
        tl.to('#card-1', { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.2);
        tl.to('#card-2', { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.45);
        tl.to('#card-3', { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.7);

        // 2. CARD 1 Animation: Bar Chart Race
        // Starts at 1.0s, races to final values over 1.8s.
        // INTHON bar finishes last for dramatic effect.
        const barNat = document.getElementById('bar-nat');
        const barJson = document.getElementById('bar-json');
        const barInth = document.getElementById('bar-inth');
        const chkBadge = document.getElementById('chk-badge');
        const badgeEff = document.getElementById('badge-eff');

        // Natural Language (120t) -> reaches 100% width
        tl.to(barNat, { width: '100%', duration: 1.0, ease: "power2.out" }, 1.0);
        
        // JSON Plan (90t) -> reaches 75% width
        tl.to(barJson, { width: '75%', duration: 1.2, ease: "power2.out" }, 1.0);

        // INTHON Plan (52t) -> reaches 43.3% width. Starts at same time but takes longer (1.8s) so it finishes last!
        tl.to(barInth, { width: '43.3%', duration: 1.8, ease: "power1.inOut" }, 1.0);
        
        // Glow/Checkmark and Badge reveal after INTHON finishes (2.8s)
        tl.to(chkBadge, { opacity: 1, duration: 0.25 }, 2.8);
        tl.to(badgeEff, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 3.0);

        // 3. CARD 2 Animation: Safety Progress Ring (Starts at 2.0s)
        const ring = document.getElementById('safety-ring');
        const blockedText = document.getElementById('blocked-count');
        const badgeSafe = document.getElementById('badge-safe');
        
        // Progress Ring animates from 439.82 offset to 0 offset (100% complete) over 2.0 seconds
        tl.to(ring, { strokeDashoffset: 0, duration: 2.0, ease: "power2.inOut" }, 2.0);

        // Counter text ticks up 0/6 to 6/6
        const safetyCounter = { val: 0 };
        tl.to(safetyCounter, {
          val: 6,
          duration: 2.0,
          ease: "power2.inOut",
          onUpdate: () => {
            const count = Math.floor(safetyCounter.val);
            blockedText.textContent = count + "/6";
          }
        }, 2.0);

        // Exploit pills pop in staggered as the counter ticks up
        const exploitPills = [
          document.getElementById('pill-0'),
          document.getElementById('pill-1'),
          document.getElementById('pill-2'),
          document.getElementById('pill-3'),
          document.getElementById('pill-4'),
          document.getElementById('pill-5')
        ];
        
        exploitPills.forEach((pill, idx) => {
          // Staggered trigger from 2.2s to 3.8s
          const time = 2.2 + idx * 0.3;
          tl.to(pill, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.2)" }, time);
          tl.call(() => {
            pill.classList.add('blocked');
          }, null, time + 0.1);
        });

        tl.to(badgeSafe, { opacity: 1, duration: 0.4 }, 4.2);

        // 4. CARD 3 Animation: Latency Numbers (Starts at 1.5s)
        const valCompile = document.getElementById('val-compile');
        const valExec = document.getElementById('val-exec');
        const badgeLat = document.getElementById('badge-lat');

        // Compile latency ticks to "< 1"
        tl.call(() => {
          valCompile.textContent = "< 1";
        }, null, 2.5);

        // VM Execution ticks to 3.04ms over 1.5s
        const execCounter = { val: 0.00 };
        tl.to(execCounter, {
          val: 3.04,
          duration: 1.5,
          ease: "power3.out",
          onUpdate: () => {
            valExec.textContent = execCounter.val.toFixed(2);
          }
        }, 2.0);

        tl.to(badgeLat, { opacity: 1, duration: 0.4 }, 3.8);

        window.__timelines["benchmark-chart"] = tl;
      })();
    </script>
