      .dot-yellow { background-color: #F59E0B; }
      .dot-green { background-color: #10B981; }

        display: flex;
        gap: 2px;
        height: 100%;
        align-items: flex-end;
      }

      .tab {
        height: 38px;

        border: 1px solid #1F2937;

        border-top-left-radius: 6px;
        border-top-right-radius: 6px;

        align-items: center;
        gap: 10px;
        color: #F9FAFB;
        font-family: 'JetBrains Mono', monospace;

      .tab.inactive {
        background-color: #0B0F19;
        color: #6B7280;
        border-color: transparent;
      }

      .tab-icon {
        width: 14px;
        height: 14px;

        background-repeat: no-repeat;
      }

      .tab-status {
        font-size: 10px;
        color: #8B5CF6;
      }

      .header-right {
        width: 100px;
        text-align: right;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: #6B7280;
      }

      /* Main Editor Workspace */
      .editor-body {
        flex: 1;
        display: flex;
        position: relative;
        overflow: hidden;
      }

      /* Multi-pane configuration */
      .pane-container {
        position: absolute;
        inset: 0;
        display: flex;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .pane-container.active {
        opacity: 1;
        pointer-events: auto;
      }

      /* Line numbers gutter */
      .gutter {
        width: 60px;
        background-color: #0B0F19;
        border-right: 1px solid #1F2937;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        padding-right: 15px;

      }

      .line-num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        line-height: 28px;
        color: #374151;
      }

      .code-container {
        flex: 1;
        background-color: #111827;
        padding: 20px 24px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        line-height: 28px;
        color: #F9FAFB;
        white-space: pre;
        position: relative;

      .orange-kw { color: #F59E0B; } /* Orange */
      .green-kw { color: #10B981; } /* Green */

      .type { color: #3B82F6; } /* Blue types */
      .comment { color: #6B7280; font-style: italic; } /* Gray comments */
      .number { color: #F59E0B; } /* Orange numbers */

      .typewriter-char {
        opacity: 0;
        display: inline;
      }

      .typewriter-char.visible {
        opacity: 1;
      }

      /* Cursor */
      .cursor {
        display: inline-block;
        width: 8px;
        height: 22px;
        background-color: #00D4FF;
        box-shadow: 0 0 8px #00D4FF;

      .vector-dot {

      .vector-connection {

        stroke-width: 1px;

      .approval-gate-overlay {

    </div>

    <!-- Typewriter Cursor Template -->
    <span data-hf-id="hf-c2d8" class="cursor" id="editor-cursor" style="display:none;"></span>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Utility to convert text nodes to individual span chars for typewriter
        function prepareTypewriter(element) {
          const chars = [];
          function traverse(node) {
            if (node.nodeType === Node.TEXT_NODE) {
              const text = node.nodeValue;
              const parent = node.parentNode;
              const fragment = document.createDocumentFragment();
              for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.className = 'typewriter-char';
                span.textContent = text[i];
                fragment.appendChild(span);
                chars.push(span);
              }
              parent.replaceChild(fragment, node);
            } else {
              const children = Array.from(node.childNodes);
              for (const child of children) {
                traverse(child);
              }
            }
          }
          traverse(element);
          return chars;
        }

        // Initialize typewriter characters in containers
        const codeA = document.getElementById('code-a');
        const codeB = document.getElementById('code-b');
        const codeCTop = document.getElementById('code-c-top');
        const codeCBot = document.getElementById('code-c-bottom');

        const charsA = prepareTypewriter(codeA);
        const charsB = prepareTypewriter(codeB);
        const charsCTop = prepareTypewriter(codeCTop);
        const charsCBot = prepareTypewriter(codeCBot);

        const cursor = document.getElementById('editor-cursor');

        // Blinking cursor setup
        tl.to(cursor, { opacity: 0, duration: 0.265, yoyo: true, repeat: 100, ease: "steps(1)" }, 0);

        // Helper to programmatically type characters onto the timeline
        function buildTypewriterTweens(chars, startT, charsPerSec) {
          const dur = 1 / charsPerSec;
          chars.forEach((char, idx) => {
            const t = startT + idx * dur;
            // Reveal character
            tl.set(char, { className: "typewriter-char visible" }, t);
            // Move cursor to follow character
            tl.call(() => {
              cursor.style.display = "inline-block";
              char.parentNode.insertBefore(cursor, char.nextSibling);
            }, null, t);
          });
          return startT + chars.length * dur;
        }

        // --- SCENE 4 SCHEDULE (Timeline relative: total 28s: 0s to 28s) ---
        // 0s to 9s: Demo A (Agent Block)
        // 9s to 17s: Demo B (Episodic Memory)
        // 17s to 28s: Demo C (Approval Gate + Retry)


        const tabA = document.getElementById('tab-a');
        const tabB = document.getElementById('tab-b');
        const tabC = document.getElementById('tab-c');
        const paneA = document.getElementById('pane-a');
        const paneB = document.getElementById('pane-b');
        const paneC = document.getElementById('pane-c');

        // 1. DEMO A: Agent Block

        // Type Demo A code
        const endTypeA = buildTypewriterTweens(charsA, 0.5, 40);

        // 2. Transition to DEMO B (9s)
        tl.set([paneA, tabA], { className: (i, el) => el.id === 'tab-a' ? 'tab inactive' : 'pane-container' }, 9.0);
        tl.set([paneB, tabB], { className: (i, el) => el.id === 'tab-b' ? 'tab' : 'pane-container active' }, 9.0);

        // Type Demo B code
        const endTypeB = buildTypewriterTweens(charsB, 9.5, 40);

        // Demo B Visual Animation (Vector Clusters)
        // Stagger high-lighting vector dots and drawing lines
        const dots = document.querySelectorAll('#vector-container .vector-dot');
        const connLine1 = document.getElementById('conn-line-1');
        const connLine2 = document.getElementById('conn-line-2');

        tl.to(dots[0], { className: 'vector-dot highlighted', duration: 0.3 }, 11.0);
        tl.to(dots[5], { className: 'vector-dot highlighted', duration: 0.3 }, 11.4);
        tl.to(connLine1, { opacity: 0.8, duration: 0.5 }, 11.6);
        tl.to(dots[2], { className: 'vector-dot highlighted', duration: 0.3 }, 12.0);
        tl.to(connLine2, { opacity: 0.8, duration: 0.5 }, 12.2);
        tl.to(dots[7], { className: 'vector-dot highlighted', duration: 0.3 }, 13.0);

        // 3. Transition to DEMO C (17s)
        tl.set([paneB, tabB], { className: (i, el) => el.id === 'tab-b' ? 'tab inactive' : 'pane-container' }, 17.0);
        tl.set([paneC, tabC], { className: (i, el) => el.id === 'tab-c' ? 'tab' : 'pane-container active' }, 17.0);

        // Type Demo C top code
        const endTypeCTop = buildTypewriterTweens(charsCTop, 17.5, 40);

        // Gate Pause Animation (20.5s to 22.5s)
        const gate = document.getElementById('approval-gate');
        tl.to(gate, { opacity: 1, duration: 0.4 }, 20.5);
        tl.to(gate, { opacity: 0, duration: 0.4 }, 22.5);

        // Type Demo C bottom code
        const endTypeCBot = buildTypewriterTweens(charsCBot, 23.0, 40);

        // Retry Backoff Animation
        const indicators = document.getElementById('backoff-indicators');
        const try1 = document.getElementById('try-1');
        const try2 = document.getElementById('try-2');
        const try3 = document.getElementById('try-3');

        tl.to(indicators, { opacity: 1, duration: 0.3 }, 24.5);
        tl.to(try1, { width: '100%', duration: 0.5 }, 25.0);
        tl.to(try2, { width: '100%', duration: 0.8 }, 26.0);
        tl.to(try3, { width: '100%', backgroundColor: '#10B981', duration: 1.2 }, 27.0);

        // Fade cursor out at the end of Scene 4
        tl.set(cursor, { display: 'none' }, 27.9);

        window.__timelines["code-editor"] = tl;
      })();
    </script>
  </div>
