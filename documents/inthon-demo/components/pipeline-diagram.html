<template id="pipeline-diagram-template">
  <div data-hf-id="hf-qonz" data-composition-id="pipeline-diagram" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="pipeline-diagram"] {
        width: 1920px;
        height: 1080px;
        background-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }

      .pipeline-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0px; /* Connectors overlap */
        position: relative;
        width: 800px;
        height: 960px;
      }

      /* Stage Box Styles */
      .stage-box {
        width: 440px;
        height: 90px;
        background-color: #111827;
        border: 1px solid #1F2937;
        border-radius: 8px;
        display: flex;
        align-items: center;
        padding: 0 30px;
        justify-content: space-between;
        box-sizing: border-box;
        position: relative;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s ease;
      }

      .stage-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .stage-num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: #6B7280;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .stage-name {
        font-size: 18px;
        font-weight: bold;
        color: #F9FAFB;
      }

      .stage-status {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #374151;
        box-shadow: 0 0 0 rgba(0, 212, 255, 0);
        transition: all 0.4s ease;
      }

      /* Connector SVG */
      .connector-svg {
        width: 100px;
        height: 70px;
        overflow: visible;
        pointer-events: none;
      }

      .connector-line {
        stroke: #1F2937;
        stroke-width: 3px;
        fill: none;
        stroke-dasharray: 70;
        stroke-dashoffset: 70;
      }

      .connector-arrow {
        fill: #1F2937;
        opacity: 0;
        transition: fill 0.4s ease, opacity 0.4s ease;
      }

      /* Glow & Active States */
      .stage-box.active {
        border-color: #00D4FF;
        box-shadow: 0 0 25px rgba(0, 212, 255, 0.35);
      }

      .stage-box.active .stage-name {
        color: #00D4FF;
      }

      .stage-box.active .stage-status {
        background-color: #00D4FF;
        box-shadow: 0 0 10px #00D4FF;
      }

      /* Security Gate Glow (Policy Sandbox) */
      .stage-box.active.security {
        border-color: #8B5CF6;
        box-shadow: 0 0 25px rgba(139, 92, 246, 0.35);
      }

      .stage-box.active.security .stage-name {
        color: #8B5CF6;
      }

      .stage-box.active.security .stage-status {
        background-color: #8B5CF6;
        box-shadow: 0 0 10px #8B5CF6;
      }

      /* VM Glow (InthonVM) */
      .stage-box.active.vm {
        border-color: #10B981;
        box-shadow: 0 0 35px rgba(16, 185, 129, 0.5);
      }

      .stage-box.active.vm .stage-name {
        color: #10B981;
      }

      .stage-box.active.vm .stage-status {
        background-color: #10B981;
        box-shadow: 0 0 15px #10B981;
      }

      .connector-line.active {
        stroke: #00D4FF;
        box-shadow: 0 0 8px #00D4FF;
      }
    </style>

    <div data-hf-id="hf-u5ew" class="pipeline-wrapper">
      <!-- Stage 1 -->
      <div data-hf-id="hf-6ast" class="stage-box" id="box-1">
        <div data-hf-id="hf-0r23" class="stage-info">
          <span data-hf-id="hf-wezv" class="stage-num">Stage 01</span>
          <span data-hf-id="hf-13ex" class="stage-name">Lex &amp; Parse</span>
        </div>
        <div data-hf-id="hf-9iw9" class="stage-status"></div>
      </div>

      <!-- Connector 1 -->
      <svg data-hf-id="hf-214k" class="connector-svg" id="conn-svg-1">
        <path data-hf-id="hf-n1am" class="connector-line" id="line-1" d="M 50 0 L 50 60" />
        <polygon data-hf-id="hf-08tg" class="connector-arrow" id="arrow-1" points="45,55 55,55 50,65" />
      </svg>

      <!-- Stage 2 -->
      <div data-hf-id="hf-a8wu" class="stage-box" id="box-2">
        <div data-hf-id="hf-s52z" class="stage-info">
          <span data-hf-id="hf-w0ou" class="stage-num">Stage 02</span>
          <span data-hf-id="hf-sls1" class="stage-name">AST Generation</span>
        </div>
        <div data-hf-id="hf-3wt9" class="stage-status"></div>
      </div>

      <!-- Connector 2 -->
      <svg data-hf-id="hf-ap0f" class="connector-svg" id="conn-svg-2">
        <path data-hf-id="hf-j36l" class="connector-line" id="line-2" d="M 50 0 L 50 60" />
        <polygon data-hf-id="hf-9f3d" class="connector-arrow" id="arrow-2" points="45,55 55,55 50,65" />
      </svg>

      <!-- Stage 3 -->
      <div data-hf-id="hf-e70v" class="stage-box" id="box-3">
        <div data-hf-id="hf-rqry" class="stage-info">
          <span data-hf-id="hf-vmdt" class="stage-num">Stage 03</span>
          <span data-hf-id="hf-v613" class="stage-name">Semantic Analysis</span>
        </div>
        <div data-hf-id="hf-53qc" class="stage-status"></div>
      </div>

      <!-- Connector 3 -->
      <svg data-hf-id="hf-6qwe" class="connector-svg" id="conn-svg-3">
        <path data-hf-id="hf-ibis" class="connector-line" id="line-3" d="M 50 0 L 50 60" />
        <polygon data-hf-id="hf-w3mi" class="connector-arrow" id="arrow-3" points="45,55 55,55 50,65" />
      </svg>

      <!-- Stage 4 -->
      <div data-hf-id="hf-gav2" class="stage-box security" id="box-4">
        <div data-hf-id="hf-rcgx" class="stage-info">
          <span data-hf-id="hf-v82s" class="stage-num">Stage 04</span>
          <span data-hf-id="hf-v20y" class="stage-name">Policy Sandbox</span>
        </div>
        <div data-hf-id="hf-4pfb" class="stage-status"></div>
      </div>

      <!-- Connector 4 -->
      <svg data-hf-id="hf-fes9" class="connector-svg" id="conn-svg-4">
        <path data-hf-id="hf-5t0b" class="connector-line" id="line-4" d="M 50 0 L 50 60" />
        <polygon data-hf-id="hf-3w7j" class="connector-arrow" id="arrow-4" points="45,55 55,55 50,65" />
      </svg>

      <!-- Stage 5 -->
      <div data-hf-id="hf-l4eh" class="stage-box" id="box-5">
        <div data-hf-id="hf-qy5w" class="stage-info">
          <span data-hf-id="hf-utrr" class="stage-num">Stage 05</span>
          <span data-hf-id="hf-umuj" class="stage-name">IR Builder</span>
        </div>
        <div data-hf-id="hf-5wce" class="stage-status"></div>
      </div>

      <!-- Connector 5 -->
      <svg data-hf-id="hf-en4g" class="connector-svg" id="conn-svg-5">
        <path data-hf-id="hf-1uwa" class="connector-line" id="line-5" d="M 50 0 L 50 60" />
        <polygon data-hf-id="hf-2ecw" class="connector-arrow" id="arrow-5" points="45,55 55,55 50,65" />
      </svg>

      <!-- Stage 6 -->
      <div data-hf-id="hf-8n8f" class="stage-box vm" id="box-6">
        <div data-hf-id="hf-qjuv" class="stage-info">
          <span data-hf-id="hf-ufgq" class="stage-num">Stage 06</span>
          <span data-hf-id="hf-pckf" class="stage-name">InthonVM ⚡</span>
        </div>
        <div data-hf-id="hf-5i1d" class="stage-status"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // --- SCENE 3 SCHEDULE (Timeline relative: total 12s: 0s to 12s) ---
        // Stagger boxes appearing and lines drawing
        const boxes = [
          document.getElementById('box-1'),
          document.getElementById('box-2'),
          document.getElementById('box-3'),
          document.getElementById('box-4'),
          document.getElementById('box-5'),
          document.getElementById('box-6')
        ];

        const lines = [
          document.getElementById('line-1'),
          document.getElementById('line-2'),
          document.getElementById('line-3'),
          document.getElementById('line-4'),
          document.getElementById('line-5')
        ];

        const arrows = [
          document.getElementById('arrow-1'),
          document.getElementById('arrow-2'),
          document.getElementById('arrow-3'),
          document.getElementById('arrow-4'),
          document.getElementById('arrow-5')
        ];

        // 1. Box entrances: Staggered from 0.5s to 3.0s
        boxes.forEach((box, i) => {
          const t = 0.3 + i * 0.45;
          tl.to(box, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, t);
          
          if (i < 5) {
            // Draw connector line
            tl.to(lines[i], { strokeDashoffset: 0, duration: 0.4, ease: "none" }, t + 0.35);
            tl.to(arrows[i], { opacity: 1, duration: 0.15 }, t + 0.7);
          }
        });

        // 2. Sequential Glow Scan (Starts at 3.5s)
        // Scan Lex & Parse
        tl.call(() => { boxes[0].classList.add('active'); }, null, 3.5);
        // Scan AST
        tl.call(() => {
          boxes[0].classList.remove('active');
          boxes[1].classList.add('active');
          lines[0].style.stroke = '#00D4FF';
          arrows[0].style.fill = '#00D4FF';
        }, null, 4.5);
        // Scan Semantic
        tl.call(() => {
          boxes[1].classList.remove('active');
          boxes[2].classList.add('active');
          lines[0].style.stroke = '#1F2937';
          arrows[0].style.fill = '#1F2937';
          lines[1].style.stroke = '#00D4FF';
          arrows[1].style.fill = '#00D4FF';
        }, null, 5.5);
        // Scan Policy (Security block - purple)
        tl.call(() => {
          boxes[2].classList.remove('active');
          boxes[3].classList.add('active');
          lines[1].style.stroke = '#1F2937';
          arrows[1].style.fill = '#1F2937';
          lines[2].style.stroke = '#8B5CF6';
          arrows[2].style.fill = '#8B5CF6';
        }, null, 6.5);
        // Scan IR Builder
        tl.call(() => {
          boxes[3].classList.remove('active');
          boxes[4].classList.add('active');
          lines[2].style.stroke = '#1F2937';
          arrows[2].style.fill = '#1F2937';
          lines[3].style.stroke = '#00D4FF';
          arrows[3].style.fill = '#00D4FF';
        }, null, 7.5);
        // Scan InthonVM (VM block - green)
        tl.call(() => {
          boxes[4].classList.remove('active');
          boxes[5].classList.add('active');
          lines[3].style.stroke = '#1F2937';
          arrows[3].style.fill = '#1F2937';
          lines[4].style.stroke = '#10B981';
          arrows[4].style.fill = '#10B981';
        }, null, 8.5);

        // Keep all active or clear at 11s
        tl.call(() => {
          boxes[5].classList.remove('active');
          lines[4].style.stroke = '#1F2937';
          arrows[4].style.fill = '#1F2937';
        }, null, 11.2);

        window.__timelines["pipeline-diagram"] = tl;
      })();
    </script>
  </div>
</template>
