<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Cyan to Purple Gradient for Logo Emblem -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Interlocking Loops (Python / Brain Node Emblem) -->
    <g transform="translate(10, 0)">
      <!-- Left loop -->
      <path d="M 90,50 
               C 130,50 150,90 150,110 
               C 150,150 110,170 70,170 
               C 30,170 10,140 10,100 
               C 10,60 40,30 90,30 
               C 120,30 140,50 160,80" 
            fill="none" 
            stroke="url(#logoGrad)" 
            stroke-width="16" 
            stroke-linecap="round"
            filter="url(#glow)" />
      
      <!-- Right loop, interlocking -->
      <path d="M 110,150 
               C 70,150 50,110 50,90 
               C 50,50 90,30 130,30 
               C 170,30 190,60 190,100 
               C 190,140 160,170 110,170 
               C 80,170 60,150 40,120" 
            fill="none" 
            stroke="url(#logoGrad)" 
            stroke-width="16" 
            stroke-linecap="round"
            filter="url(#glow)" />
      
      <!-- Tech connection dots representing agency -->
      <circle cx="90" cy="30" r="8" fill="#F9FAFB" />
      <circle cx="110" cy="170" r="8" fill="#F9FAFB" />
      <circle cx="50" cy="90" r="6" fill="#00D4FF" />
      <circle cx="150" cy="110" r="6" fill="#8B5CF6" />
    </g>

    <!-- INTHON Typography wordmark -->
    <text x="240" y="125" 
          font-family="system-ui, -apple-system, 'Inter', sans-serif" 
          font-size="88" 
          font-weight="900" 
          letter-spacing="-0.04em" 
          fill="#F9FAFB">
      IN<tspan fill="#00D4FF">T</tspan>HON
    </text>

    <!-- Tagline (smaller text below wordmark) -->
    <text x="245" y="165" 
          font-family="system-ui, -apple-system, 'Inter', sans-serif" 
          font-size="16" 
          font-weight="600" 
          letter-spacing="0.4em" 
          fill="#6B7280" 
          text-transform="uppercase">
      Intelligent + Python Layer
    </text>
  </g>
</svg>
