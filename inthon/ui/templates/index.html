<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inthon Agent Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #090d16;
            --panel-bg: rgba(17, 24, 39, 0.6);
            --panel-border: rgba(255, 255, 255, 0.05);
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --user-bubble: rgba(59, 130, 246, 0.15);
            --user-border: rgba(59, 130, 246, 0.3);
            --assistant-bubble: rgba(255, 255, 255, 0.03);
            --assistant-border: rgba(255, 255, 255, 0.08);
            --system-bubble: rgba(239, 68, 68, 0.1);
            --system-border: rgba(239, 68, 68, 0.3);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0, transparent 50%);
        }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--panel-border);
            z-index: 100;
        }

        .logo-section h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-section span {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--panel-border);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .metrics-bar {
            display: flex;
            gap: 1.5rem;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-value {
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            padding: 0.4rem 1rem;
            border-radius: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success-color);
            box-shadow: 0 0 8px var(--success-color);
        }

        .status-dot.thinking {
            background-color: var(--warning-color);
            box-shadow: 0 0 8px var(--warning-color);
            animation: pulse 1.5s infinite;
        }

        /* ── Main Layout ── */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ── Sidebar ── */
        aside {
            width: var(--sidebar-width);
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .sidebar-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.4rem;
        }

        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .memory-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .memory-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .memory-value {
            color: var(--text-primary);
            word-break: break-all;
        }

        /* ── Center Content Workspace ── */
        .workspace {
            display: flex;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ── Chat Viewport ── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            animation: slideIn 0.3s ease-out;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            border: 1px solid var(--user-border);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--assistant-bubble);
            border: 1px solid var(--assistant-border);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            max-width: 90%;
            background-color: var(--system-bubble);
            border: 1px solid var(--system-border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
        }

        .message .role-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        /* ── Interactive Layout Components ── */
        .components-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .widget-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .widget-header {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .widget-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .widget-json {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            max-height: 250px;
        }

        /* Collapsible trace steps (Chainlit style) */
        .trace-step {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .trace-step-header {
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            background: rgba(255, 255, 255, 0.02);
        }

        .trace-step-header:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .trace-title-group {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .trace-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .trace-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .trace-duration {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid var(--panel-border);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
        }

        .trace-content {
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--panel-border);
            display: none;
            overflow-x: auto;
            max-height: 200px;
            white-space: pre-wrap;
        }

        .trace-step.expanded .trace-content {
            display: block;
        }

        /* Status Widget */
        .status-widget {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            padding: 0.8rem 1rem;
            border-radius: 8px;
        }

        .status-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
        }

        .status-widget.success .status-spinner {
            border-color: var(--success-color);
            animation: none;
            background: var(--success-color);
            border-radius: 50%;
            width: 12px;
            height: 12px;
        }

        .status-widget.failed .status-spinner {
            border-color: var(--danger-color);
            animation: none;
            background: var(--danger-color);
            border-radius: 50%;
            width: 12px;
            height: 12px;
        }

        /* Buttons */
        .widget-button {
            background: linear-gradient(135deg, var(--accent-color), #2563eb);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            align-self: flex-start;
        }

        .widget-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .widget-button:active {
            transform: translateY(0);
        }

        /* ── Input Box Area ── */
        .input-area {
            padding: 1.5rem 2rem;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--panel-border);
        }

        .chat-input-form {
            display: flex;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 0.5rem 0.8rem;
            align-items: center;
            transition: border-color 0.2s ease;
        }

        .chat-input-form:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 1px var(--accent-color);
        }

        .chat-input-form textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.4rem;
            height: 24px;
            max-height: 120px;
        }

        .send-btn {
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            color: var(--accent-color);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── Human-in-the-loop Approval Card ── */
        .approval-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(9, 13, 22, 0.8);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .approval-card {
            background: #111827;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 20px rgba(239, 68, 68, 0.1);
            animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .approval-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--danger-color);
        }

        .approval-header svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .approval-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .approval-summary {
            font-size: 0.95rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.4;
        }

        .approval-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.85rem;
        }

        .approval-meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .approval-meta-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .approval-meta-val {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .approval-actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn-approve {
            flex: 1;
            background: var(--success-color);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-approve:hover {
            background-color: #059669;
        }

        .btn-reject {
            flex: 1;
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-reject:hover {
            background-color: #dc2626;
        }

        /* ── Animations ── */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── Custom Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo-section">
            <h1 id="dashboard-title">Inthon Agentic Dashboard <span>v0.1</span></h1>
        </div>
        <div class="metrics-bar">
            <div class="metric-card">
                <span class="metric-label">Run ID</span>
                <span class="metric-value" id="run-id-val">N/A</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Tool Calls</span>
                <span class="metric-value" id="tool-calls-val">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Cost</span>
                <span class="metric-value" id="cost-val">$0.000000</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="status-indicator-dot"></div>
                <span id="status-text">Idle</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside id="sidebar-panel">
            <div class="sidebar-section">
                <h3>Controls</h3>
                <div id="sidebar-components" style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <!-- Sidebar widgets injected here -->
                </div>
            </div>
            <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column;">
                <h3>Episodic Memory</h3>
                <div class="memory-list" id="memory-items-list" style="flex: 1;">
                    <!-- Memory entries here -->
                </div>
            </div>
        </aside>

        <!-- Workspace (Chat & Widgets) -->
        <div class="workspace">
            <div class="chat-container" id="chat-viewport">
                <!-- Chat feed -->
                <div class="message system">
                    <span class="role-label">System</span>
                    <div>Welcome to Inthon UI Workspace. Type below to query the agent.</div>
                </div>

                <!-- Custom widgets injected here -->
                <div class="components-container" id="body-components"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <form class="chat-input-form" id="chat-form">
                    <textarea id="chat-textarea" placeholder="Type your query..." rows="1"></textarea>
                    <button class="send-btn" type="submit" id="send-button">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </form>
            </div>

            <!-- Approval Overlay -->
            <div class="approval-overlay" id="approval-box">
                <div class="approval-card">
                    <div class="approval-header">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h-2v4h6zm0-8h-2V7h2v2z"/>
                        </svg>
                        <h2>Verification Gate</h2>
                    </div>
                    <div class="approval-summary" id="approval-summary-text">
                        Agent wants to execute stripe.charge on user request.
                    </div>
                    <div class="approval-meta">
                        <div class="approval-meta-item">
                            <span class="approval-meta-label">Action</span>
                            <span class="approval-meta-val" id="approval-action-val">pay</span>
                        </div>
                        <div class="approval-meta-item">
                            <span class="approval-meta-label">Target</span>
                            <span class="approval-meta-val" id="approval-target-val">stripe.charge</span>
                        </div>
                    </div>
                    <div class="approval-actions">
                        <button class="btn-reject" id="approval-reject-btn">Reject</button>
                        <button class="btn-approve" id="approval-approve-btn">Approve</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket setup
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
        let ws;
        
        function connect() {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log("WebSocket connected");
            };
            
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleWebSocketEvent(message);
            };
            
            ws.onclose = () => {
                console.log("WebSocket disconnected, retrying in 2 seconds...");
                setTimeout(connect, 2000);
            };
        }
        
        // Handle input form resize
        const textarea = document.getElementById("chat-textarea");
        textarea.addEventListener("input", function() {
            this.style.height = "24px";
            this.style.height = (this.scrollHeight - 10) + "px";
        });
        
        textarea.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                document.getElementById("chat-form").requestSubmit();
            }
        });

        document.getElementById("chat-form").onsubmit = (e) => {
            e.preventDefault();
            const text = textarea.value.trim();
            if (!text) return;
            
            // Send event via websocket
            ws.send(JSON.stringify({
                event: "chat_message",
                data: { text: text }
            }));
            
            // Append user bubble locally
            appendChatMessage({role: "user", content: text});
            textarea.value = "";
            textarea.style.height = "24px";
        };
        
        // Render functions
        function handleWebSocketEvent(msg) {
            const { event, data } = msg;
            switch(event) {
                case "init":
                    document.getElementById("dashboard-title").innerHTML = `${data.title} <span>v0.1</span>`;
                    document.title = data.title;
                    
                    // Clear and render components
                    document.getElementById("body-components").innerHTML = "";
                    document.getElementById("sidebar-components").innerHTML = "";
                    data.components.forEach(renderComponent);
                    
                    // Clear and render chat
                    const chatViewport = document.getElementById("chat-viewport");
                    // Retain first welcome system message
                    chatViewport.innerHTML = `
                        <div class="message system">
                            <span class="role-label">System</span>
                            <div>Welcome to Inthon UI Workspace. Type below to query the agent.</div>
                        </div>
                        <div class="components-container" id="body-components"></div>
                    `;
                    data.chat_history.forEach(appendChatMessage);
                    
                    // Memory and metrics
                    updateMemory(data.memory);
                    updateMetrics(data.metrics);
                    break;
                    
                case "add_component":
                    renderComponent(data);
                    break;
                    
                case "update_component":
                    updateComponent(data);
                    break;
                    
                case "chat_message":
                    appendChatMessage(data);
                    break;
                    
                case "clear_chat":
                    document.getElementById("chat-viewport").innerHTML = '<div class="components-container" id="body-components"></div>';
                    break;
                    
                case "status_change":
                    updateStatus(data);
                    break;
                    
                case "update_metrics":
                    updateMetrics(data);
                    break;
                    
                case "update_memory":
                    updateMemory(data);
                    break;
                    
                case "approval_required":
                    showApprovalBox(data);
                    break;
                    
                case "approval_resolved":
                    hideApprovalBox();
                    break;
            }
        }
        
        function renderComponent(comp) {
            const targetContainer = comp.sidebar 
                ? document.getElementById("sidebar-components")
                : document.getElementById("body-components");
                
            if (!targetContainer) return;
            
            // Check if component already exists
            if (document.getElementById(comp.id)) return;
            
            const div = document.createElement("div");
            div.id = comp.id;
            
            switch(comp.type) {
                case "title":
                    div.className = "widget-title";
                    div.innerText = comp.content;
                    break;
                case "header":
                    div.className = "widget-header";
                    div.innerText = comp.content;
                    break;
                case "text":
                    div.className = "widget-text";
                    div.innerText = comp.content;
                    break;
                case "json":
                    div.className = "widget-json";
                    div.innerText = typeof comp.content === "object" 
                        ? JSON.stringify(comp.content, null, 2)
                        : comp.content;
                    break;
                case "button":
                    const btn = document.createElement("button");
                    btn.className = "widget-button";
                    btn.innerText = comp.label;
                    btn.onclick = () => {
                        ws.send(JSON.stringify({
                            event: "button_click",
                            data: { id: comp.id }
                        }));
                    };
                    div.appendChild(btn);
                    break;
                case "status":
                    div.className = `status-widget ${comp.state}`;
                    div.innerHTML = `
                        <div class="status-spinner"></div>
                        <span class="status-label">${comp.label}</span>
                    `;
                    break;
                case "trace_step":
                    div.className = "trace-step";
                    div.innerHTML = `
                        <div class="trace-step-header" onclick="toggleTrace('${comp.id}')">
                            <div class="trace-title-group">
                                <span class="trace-title">${comp.title}</span>
                                <span class="trace-subtitle">${comp.subtitle}</span>
                            </div>
                            <span class="trace-duration">${comp.duration || "N/A"}</span>
                        </div>
                        <div class="trace-content">${comp.content}</div>
                    `;
                    break;
            }
            
            targetContainer.appendChild(div);
            scrollToBottom();
        }
        
        function updateComponent(comp) {
            const el = document.getElementById(comp.id);
            if (!el) return;
            
            if (comp.type === "status") {
                el.className = `status-widget ${comp.state}`;
                el.querySelector(".status-label").innerText = comp.label;
            }
        }
        
        function toggleTrace(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.toggle("expanded");
            }
        }
        
        function appendChatMessage(msg) {
            const view = document.getElementById("chat-viewport");
            const div = document.createElement("div");
            div.className = `message ${msg.role}`;
            
            let label = "Assistant";
            if (msg.role === "user") label = "User";
            if (msg.role === "system") label = "System";
            
            div.innerHTML = `
                <span class="role-label">${label}</span>
                <div style="white-space: pre-wrap;">${msg.content}</div>
            `;
            
            // Insert before the components container to keep components at the bottom
            const compsContainer = document.getElementById("body-components");
            view.insertBefore(div, compsContainer);
            scrollToBottom();
        }
        
        function updateStatus(state) {
            const indicator = document.getElementById("status-indicator-dot");
            const text = document.getElementById("status-text");
            
            if (state === "thinking") {
                indicator.className = "status-dot thinking";
                text.innerText = "Thinking...";
            } else {
                indicator.className = "status-dot";
                text.innerText = "Idle";
            }
        }
        
        function updateMetrics(metrics) {
            document.getElementById("run-id-val").innerText = metrics.run_id || "N/A";
            document.getElementById("tool-calls-val").innerText = metrics.tool_calls;
            document.getElementById("cost-val").innerText = `$${Number(metrics.cost_usd).toFixed(6)}`;
        }
        
        function updateMemory(memoryItems) {
            const list = document.getElementById("memory-items-list");
            list.innerHTML = "";
            
            if (memoryItems.length === 0) {
                list.innerHTML = `<div style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; margin-top: 1rem;">No facts remembered yet.</div>`;
                return;
            }
            
            memoryItems.forEach(item => {
                const card = document.createElement("div");
                card.className = "memory-card";
                card.innerHTML = `
                    <div class="memory-meta">
                        <span>ns: ${item.namespace}</span>
                        <span>k: ${item.key}</span>
                    </div>
                    <div class="memory-value">${item.value}</div>
                `;
                list.appendChild(card);
            });
        }
        
        // Approvals
        let activeApprovalId = null;
        
        function showApprovalBox(req) {
            activeApprovalId = req.id;
            document.getElementById("approval-summary-text").innerText = req.summary;
            document.getElementById("approval-action-val").innerText = req.action;
            document.getElementById("approval-target-val").innerText = req.target;
            document.getElementById("approval-box").style.display = "flex";
        }
        
        function hideApprovalBox() {
            document.getElementById("approval-box").style.display = "none";
            activeApprovalId = null;
        }
        
        document.getElementById("approval-approve-btn").onclick = () => {
            if (!activeApprovalId) return;
            ws.send(JSON.stringify({
                event: "approval_response",
                data: { id: activeApprovalId, approved: true }
            }));
            hideApprovalBox();
        };
        
        document.getElementById("approval-reject-btn").onclick = () => {
            if (!activeApprovalId) return;
            ws.send(JSON.stringify({
                event: "approval_response",
                data: { id: activeApprovalId, approved: false }
            }));
            hideApprovalBox();
        };
        
        function scrollToBottom() {
            const view = document.getElementById("chat-viewport");
            view.scrollTop = view.scrollHeight;
        }
        
        // Initial setup
        connect();
    </script>
</body>
</html>
